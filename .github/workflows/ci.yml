name: CI

on:
  push:
    branches: ["main", "feat/**", "fix/**"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build (TreatWarningsAsErrors)
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test -c Release --no-build --logger "trx;LogFileName=results.trx"

      - name: Pack (tool smoke)
        # Verify nupkg can be created; only run on one OS to save minutes.
        if: matrix.os == 'ubuntu-latest'
        run: dotnet pack src/Fugue.Cli -c Release -p:Version=0.0.0-ci --no-build

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: "**/*.trx"

  aot-smoke:
    name: AOT publish smoke (${{ matrix.rid }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: osx-arm64
            runner: macos-14
          - rid: linux-x64
            runner: ubuntu-latest
          - rid: win-x64
            runner: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: AOT publish
        run: dotnet publish src/Fugue.Cli -c Release -r ${{ matrix.rid }}

      - name: Smoke test (unix)
        if: runner.os != 'Windows'
        run: |
          BINARY=src/Fugue.Cli/bin/Release/net10.0/${{ matrix.rid }}/publish/fugue
          chmod +x $BINARY
          $BINARY --version

      - name: Smoke test (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = "src\Fugue.Cli\bin\Release\net10.0\${{ matrix.rid }}\publish\fugue.exe"
          & $bin --version
